version: 2
updates:
  # npm dependencies — one grouped PR per week to keep noise down.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns: ["*"]

  # Keep GitHub Actions (CI, CodeQL) pinned versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
