version: 2
updates:
  # npm — group only safe minor + patch updates into one PR. Major updates
  # arrive as separate, individually reviewable PRs (they often need migration).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions — same policy: group minor/patch, majors separate.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
